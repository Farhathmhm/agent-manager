{{- if .Values.externalSecrets.enabled }}
apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: external-secret-trait
  namespace: default
  annotations:
    openchoreo.dev/description: "Trait to create ExternalSecret for syncing secrets from OpenBao/Vault to K8s"
spec:
  schema:
    parameters:
      kvPath: "string | description='Path in OpenBao/Vault KV store (e.g., org/project/component)'"
      refreshInterval: "string | default=5m description='How often to refresh from KV store'"

  # Creates ExternalSecret resource on dataplane
  creates:
    - targetPlane: dataplane
      template:
        apiVersion: external-secrets.io/v1beta1
        kind: ExternalSecret
        metadata:
          name: "${metadata.componentName}-${trait.instanceName}"
          namespace: "${metadata.namespace}"
          labels:
            app.kubernetes.io/managed-by: openchoreo
            openchoreo.dev/component: "${metadata.componentName}"
            openchoreo.dev/project: "${metadata.projectName}"
        spec:
          refreshInterval: "${parameters.refreshInterval}"
          secretStoreRef:
            kind: ClusterSecretStore
            name: "${dataplane.secretStore}"
          target:
            name: "${metadata.componentName}-secrets"
          dataFrom:
            - extract:
                key: "${parameters.kvPath}"

  # Patch Deployment to inject secrets as environment variables
  patches:
    - target:
        kind: Deployment
        group: apps
        version: v1
      operations:
        - op: add
          path: /spec/template/spec/containers/0/envFrom/-
          value:
            secretRef:
              name: "${metadata.componentName}-secrets"
{{- end }}
